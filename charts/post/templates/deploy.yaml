---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: post-app
  template:
    metadata:
      labels:
        app: post-app
    spec:
      containers:
      - name: posts-ctn
        image: myoli999/post-app:1.0  
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "200m"
            memory: "64Mi"
   